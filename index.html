<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0a1e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>발레체크 — 자세 분석</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <header>
    <h1>🩰 발레체크</h1>
    <p class="subtitle">AI 자세 분석 — 턴아웃 · 플리에 · 아라베스크</p>
  </header>

  <main>

    <!-- ① 포즈 선택 -->
    <section id="pose-select">
      <p class="section-label">동작 선택</p>
      <div class="pose-cards" id="pose-cards"></div>

      <!-- ② 입력 방식 -->
      <div id="input-select">
        <p class="section-label">입력 방식</p>
        <div class="input-buttons">
          <button class="btn primary" id="btn-webcam">📹 실시간 카메라</button>
          <label class="btn" id="btn-upload-label">
            🖼️ 사진 업로드
            <input type="file" id="file-input" accept="image/*" hidden />
          </label>
        </div>
      </div>

      <!-- ③ 시퀀스 연습 -->
      <div id="sequence-section">
        <p class="section-label">🔁 시퀀스 연습</p>
        <div class="sequence-cards" id="sequence-cards"></div>
        <p class="sequence-note">실제 플리에는 멈추지 않고 이어지는 동작입니다. 이 모드는 순서 암기용 연습입니다.</p>
      </div>
    </section>

    <!-- ③ 분석 화면 -->
    <section id="analysis-view">

      <div class="video-wrap">
        <video id="webcam" autoplay playsinline muted></video>
        <img id="uploaded-img" alt="업로드 사진" />
        <canvas id="overlay"></canvas>

        <div class="video-controls">
          <button class="btn icon-btn" id="btn-flip" title="카메라 전환">🔄</button>
          <button class="btn icon-btn danger" id="btn-close" title="닫기">✕</button>
        </div>
        <div class="notice" id="lm-notice"></div>
      </div>

      <!-- 시퀀스 패널 (시퀀스 모드에서만 표시) -->
      <div id="sequence-panel" style="display:none">
        <div id="seq-step-area">
          <div class="seq-header">
            <span class="seq-progress" id="seq-progress"></span>
            <span class="seq-step-name" id="seq-step-name"></span>
          </div>
          <div class="seq-body">
            <div class="seq-svg" id="seq-svg"></div>
            <div class="seq-info">
              <p class="seq-msg" id="seq-msg"></p>
              <div class="seq-hold-wrap"><div class="seq-hold-bar" id="seq-hold-bar"></div></div>
              <p class="seq-sub-msg" id="seq-sub-msg"></p>
            </div>
          </div>
        </div>
        <div id="seq-complete" hidden>
          <p class="seq-complete-title">시퀀스 완료! 🎉</p>
          <p class="seq-complete-sub">순서를 몸이 기억할 때까지 반복해 보세요</p>
          <ul id="seq-times"></ul>
          <button class="btn primary" id="btn-seq-retry">🔁 다시 하기</button>
        </div>
      </div>

      <!-- 피드백 패널 -->
      <div id="feedback-panel">
        <p id="feedback-empty">자세를 취하면 자동으로 분석합니다.</p>
      </div>

      <!-- 하단 액션 -->
      <div id="action-bar">
        <button class="btn" id="btn-save">💾 결과 저장</button>
      </div>

    </section>

  </main>

</div>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-msg">MediaPipe 초기화 중...</p>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
